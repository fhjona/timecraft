<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Date & time span</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@450&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1219;
      --surface: #181c27;
      --border: #2a3142;
      --text: #e8eaef;
      --muted: #8b93a7;
      --accent: #6c9eff;
      --accent-dim: #4a7ad4;
      --positive: #7dd3a8;
      --radius: 12px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108, 158, 255, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(125, 211, 168, 0.06), transparent);
      color: var(--text);
      line-height: 1.5;
      padding: clamp(1.25rem, 4vw, 2.5rem);
    }

    .wrap {
      max-width: 520px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }

    .lede {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    fieldset {
      border: none;
      margin: 0;
      padding: 0;
    }

    legend {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1.1rem;
    }

    .row:last-of-type {
      margin-bottom: 0;
    }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
    }

    input[type="datetime-local"] {
      width: 100%;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 0.9rem;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      color-scheme: dark;
    }

    input[type="datetime-local"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 158, 255, 0.2);
    }

    .actions {
      margin-top: 1.35rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
    }

    button {
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: #0a0c10;
    }

    button:hover {
      filter: brightness(1.06);
    }

    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .swap {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 0.5rem 0.85rem;
    }

    .swap:hover {
      background: rgba(108, 158, 255, 0.08);
      filter: none;
    }

    .results {
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .results h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 1rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--positive);
      background: rgba(125, 211, 168, 0.1);
      border: 1px solid rgba(125, 211, 168, 0.25);
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .grid {
      display: grid;
      gap: 0.65rem;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .stat:last-child {
      border-bottom: none;
    }

    .stat span:first-child {
      color: var(--muted);
    }

    .stat strong {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-weight: 450;
      font-size: 0.9rem;
      text-align: right;
    }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      margin: 0;
    }

    .error {
      color: #f0a0a8;
      font-size: 0.875rem;
      margin: 0.75rem 0 0;
    }

    .lang-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }

    .lang-row label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
    }

    .lang-row select {
      font-family: inherit;
      font-size: 0.875rem;
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      color-scheme: dark;
      cursor: pointer;
      min-width: 11rem;
    }

    .lang-row select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108, 158, 255, 0.2);
    }

    @media (min-width: 480px) {
      .row.two {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }
      .row.two .inner {
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="lang-row">
        <label for="locale" id="i18n-lang-label">Language</label>
        <select id="locale" name="locale" aria-label="Language">
          <option value="en">English</option>
          <option value="nb">Norsk (bokmål)</option>
          <option value="pt-BR">Português (Brasil)</option>
          <option value="sv">Svenska</option>
          <option value="da">Dansk</option>
        </select>
      </div>
      <h1 id="i18n-title">Date & time span</h1>
      <p class="lede" id="i18n-lede">Pick a start and end moment. See the gap in calendar units and as a precise duration.</p>
    </header>

    <div class="card">
      <form id="form" novalidate>
        <fieldset>
          <legend id="i18n-legend">Range</legend>
          <div class="row two">
            <div class="inner row">
              <label for="start" id="i18n-label-start">From</label>
              <input type="datetime-local" id="start" name="start" required />
            </div>
            <div class="inner row">
              <label for="end" id="i18n-label-end">To</label>
              <input type="datetime-local" id="end" name="end" required />
            </div>
          </div>
        </fieldset>
        <div class="actions">
          <button type="submit" id="i18n-btn-calc">Calculate</button>
          <button type="button" class="swap" id="swap">Swap dates</button>
        </div>
      </form>

      <div class="results" id="results" hidden>
        <h2 id="i18n-result-heading">Result</h2>
        <p class="pill" id="direction"></p>
        <div class="grid" id="stats"></div>
      </div>

      <p class="empty" id="placeholder">Set both dates and press Calculate.</p>
      <p class="error" id="error" hidden></p>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "date-span-locale";
    const SUPPORTED = ["en", "nb", "pt-BR", "sv", "da"];

    const MESSAGES = {
      en: {
        pageTitle: "Date & time span",
        title: "Date & time span",
        lede: "Pick a start and end moment. See the gap in calendar units and as a precise duration.",
        langLabel: "Language",
        legend: "Range",
        labelStart: "From",
        labelEnd: "To",
        btnCalc: "Calculate",
        btnSwap: "Swap dates",
        resultHeading: "Result",
        placeholder: "Set both dates and press Calculate.",
        errNeedBoth: "Please choose both date and time.",
        dirForward: "From → To (forward in time)",
        dirBackward: "To is before From — showing absolute span",
        statCalendar: "Calendar-style",
        statDaysDec: "Total days (decimal)",
        statHours: "Total hours",
        statMinutes: "Total minutes",
        statSeconds: "Total seconds",
        sameMoment: "Same moment",
        units: {
          year: ["year", "years"],
          month: ["month", "months"],
          day: ["day", "days"],
          hour: ["hour", "hours"],
          minute: ["minute", "minutes"],
          second: ["second", "seconds"],
        },
      },
      nb: {
        pageTitle: "Dato- og tidsintervall",
        title: "Dato- og tidsintervall",
        lede: "Velg start og slutt. Se avstanden i kalenderenheter og som nøyaktig varighet.",
        langLabel: "Språk",
        legend: "Periode",
        labelStart: "Fra",
        labelEnd: "Til",
        btnCalc: "Beregn",
        btnSwap: "Bytt datoer",
        resultHeading: "Resultat",
        placeholder: "Angi begge datoene og trykk Beregn.",
        errNeedBoth: "Velg både dato og klokkeslett.",
        dirForward: "Fra → Til (fremover i tid)",
        dirBackward: "Til er før Fra — viser absolutt intervall",
        statCalendar: "Som kalender",
        statDaysDec: "Totalt dager (desimal)",
        statHours: "Timer totalt",
        statMinutes: "Minutter totalt",
        statSeconds: "Sekunder totalt",
        sameMoment: "Samme tidspunkt",
        units: {
          year: ["år", "år"],
          month: ["måned", "måneder"],
          day: ["dag", "dager"],
          hour: ["time", "timer"],
          minute: ["minutt", "minutter"],
          second: ["sekund", "sekunder"],
        },
      },
      "pt-BR": {
        pageTitle: "Intervalo de data e hora",
        title: "Intervalo de data e hora",
        lede: "Escolha início e fim. Veja o intervalo em unidades de calendário e como duração exata.",
        langLabel: "Idioma",
        legend: "Intervalo",
        labelStart: "De",
        labelEnd: "Até",
        btnCalc: "Calcular",
        btnSwap: "Inverter datas",
        resultHeading: "Resultado",
        placeholder: "Defina ambas as datas e pressione Calcular.",
        errNeedBoth: "Escolha data e hora nos dois campos.",
        dirForward: "De → Até (avanço no tempo)",
        dirBackward: "Até é antes de De — intervalo absoluto",
        statCalendar: "Estilo calendário",
        statDaysDec: "Dias totais (decimal)",
        statHours: "Horas totais",
        statMinutes: "Minutos totais",
        statSeconds: "Segundos totais",
        sameMoment: "Mesmo instante",
        units: {
          year: ["ano", "anos"],
          month: ["mês", "meses"],
          day: ["dia", "dias"],
          hour: ["hora", "horas"],
          minute: ["minuto", "minutos"],
          second: ["segundo", "segundos"],
        },
      },
      sv: {
        pageTitle: "Datum- och tidsintervall",
        title: "Datum- och tidsintervall",
        lede: "Välj start och slut. Se skillnaden i kalendernheter och som exakt varaktighet.",
        langLabel: "Språk",
        legend: "Intervall",
        labelStart: "Från",
        labelEnd: "Till",
        btnCalc: "Beräkna",
        btnSwap: "Byt datum",
        resultHeading: "Resultat",
        placeholder: "Ange båda datum och tryck Beräkna.",
        errNeedBoth: "Välj både datum och tid.",
        dirForward: "Från → Till (framåt i tiden)",
        dirBackward: "Till är före Från — visar absolut intervall",
        statCalendar: "Kalenderstil",
        statDaysDec: "Totalt dagar (decimal)",
        statHours: "Timmar totalt",
        statMinutes: "Minuter totalt",
        statSeconds: "Sekunder totalt",
        sameMoment: "Samma ögonblick",
        units: {
          year: ["år", "år"],
          month: ["månad", "månader"],
          day: ["dag", "dagar"],
          hour: ["timme", "timmar"],
          minute: ["minut", "minuter"],
          second: ["sekund", "sekunder"],
        },
      },
      da: {
        pageTitle: "Dato- og tidsinterval",
        title: "Dato- og tidsinterval",
        lede: "Vælg start og slut. Se afstanden i kalenderenheder og som præcis varighed.",
        langLabel: "Sprog",
        legend: "Interval",
        labelStart: "Fra",
        labelEnd: "Til",
        btnCalc: "Beregn",
        btnSwap: "Byt datoer",
        resultHeading: "Resultat",
        placeholder: "Angiv begge datoer og tryk Beregn.",
        errNeedBoth: "Vælg både dato og klokkeslæt.",
        dirForward: "Fra → Til (fremad i tid)",
        dirBackward: "Til er før Fra — viser absolut interval",
        statCalendar: "Som kalender",
        statDaysDec: "Dage i alt (decimal)",
        statHours: "Timer i alt",
        statMinutes: "Minutter i alt",
        statSeconds: "Sekunder i alt",
        sameMoment: "Samme tidspunkt",
        units: {
          year: ["år", "år"],
          month: ["måned", "måneder"],
          day: ["dag", "dage"],
          hour: ["time", "timer"],
          minute: ["minut", "minutter"],
          second: ["sekund", "sekunder"],
        },
      },
    };

    function msg(locale, key) {
      const pack = MESSAGES[locale] || MESSAGES.en;
      return pack[key] !== undefined ? pack[key] : MESSAGES.en[key];
    }

    function unitLabel(locale, kind, n) {
      const pack = MESSAGES[locale] || MESSAGES.en;
      const pair = pack.units[kind] || MESSAGES.en.units[kind];
      return pair[n === 1 ? 0 : 1];
    }

    function formatCalendar(c, locale) {
      const parts = [];
      const u = (kind, n) => `${n} ${unitLabel(locale, kind, n)}`;
      if (c.years) parts.push(u("year", c.years));
      if (c.months) parts.push(u("month", c.months));
      if (c.days) parts.push(u("day", c.days));
      if (c.hours) parts.push(u("hour", c.hours));
      if (c.minutes) parts.push(u("minute", c.minutes));
      if (c.seconds) parts.push(u("second", c.seconds));
      if (parts.length === 0) return msg(locale, "sameMoment");
      return parts.join(", ");
    }

    function guessLocaleFromNavigator() {
      const raw = (navigator.language || "en").replace("_", "-");
      const lower = raw.toLowerCase();
      if (SUPPORTED.includes(raw)) return raw;
      if (lower === "pt-br" || lower.startsWith("pt")) return "pt-BR";
      if (lower === "nb" || lower === "no" || lower.startsWith("nb-") || lower.startsWith("no-")) return "nb";
      if (lower.startsWith("nn")) return "nb";
      if (lower.startsWith("sv")) return "sv";
      if (lower.startsWith("da")) return "da";
      if (lower.startsWith("en")) return "en";
      return "en";
    }

    function loadLocale() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored && SUPPORTED.includes(stored)) return stored;
      } catch (_) {
        /* ignore */
      }
      return guessLocaleFromNavigator();
    }

    let currentLocale = loadLocale();

    const form = document.getElementById("form");
    const startEl = document.getElementById("start");
    const endEl = document.getElementById("end");
    const swapBtn = document.getElementById("swap");
    const localeSelect = document.getElementById("locale");
    const results = document.getElementById("results");
    const placeholder = document.getElementById("placeholder");
    const errorEl = document.getElementById("error");
    const directionEl = document.getElementById("direction");
    const statsEl = document.getElementById("stats");

    function applyStaticUI() {
      const L = currentLocale;
      document.documentElement.lang = L === "pt-BR" ? "pt-BR" : L;
      document.title = msg(L, "pageTitle");
      document.getElementById("i18n-lang-label").textContent = msg(L, "langLabel");
      document.getElementById("i18n-title").textContent = msg(L, "title");
      document.getElementById("i18n-lede").textContent = msg(L, "lede");
      document.getElementById("i18n-legend").textContent = msg(L, "legend");
      document.getElementById("i18n-label-start").textContent = msg(L, "labelStart");
      document.getElementById("i18n-label-end").textContent = msg(L, "labelEnd");
      document.getElementById("i18n-btn-calc").textContent = msg(L, "btnCalc");
      swapBtn.textContent = msg(L, "btnSwap");
      document.getElementById("i18n-result-heading").textContent = msg(L, "resultHeading");
      placeholder.textContent = msg(L, "placeholder");
      localeSelect.value = L;
      localeSelect.setAttribute("aria-label", msg(L, "langLabel"));
    }

    function setLocale(next) {
      if (!SUPPORTED.includes(next)) return;
      currentLocale = next;
      try {
        localStorage.setItem(STORAGE_KEY, next);
      } catch (_) {
        /* ignore */
      }
      applyStaticUI();
      if (!errorEl.hidden && errorEl.textContent) {
        errorEl.textContent = msg(next, "errNeedBoth");
      }
      if (!results.hidden && startEl.value && endEl.value) run();
    }

    function parseLocal(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function calendarComponents(a, b) {
      let y = b.getFullYear() - a.getFullYear();
      let m = b.getMonth() - a.getMonth();
      let d = b.getDate() - a.getDate();
      let h = b.getHours() - a.getHours();
      let min = b.getMinutes() - a.getMinutes();
      let s = b.getSeconds() - a.getSeconds();

      if (s < 0) {
        s += 60;
        min -= 1;
      }
      if (min < 0) {
        min += 60;
        h -= 1;
      }
      if (h < 0) {
        h += 24;
        d -= 1;
      }
      if (d < 0) {
        const prevMonth = new Date(b.getFullYear(), b.getMonth(), 0);
        d += prevMonth.getDate();
        m -= 1;
      }
      if (m < 0) {
        m += 12;
        y -= 1;
      }
      return { years: y, months: m, days: d, hours: h, minutes: min, seconds: s };
    }

    function showError() {
      errorEl.textContent = msg(currentLocale, "errNeedBoth");
      errorEl.hidden = false;
      results.hidden = true;
      placeholder.hidden = true;
    }

    function clearError() {
      errorEl.hidden = true;
      errorEl.textContent = "";
    }

    function addStat(label, value) {
      const row = document.createElement("div");
      row.className = "stat";
      const lab = document.createElement("span");
      lab.textContent = label;
      const val = document.createElement("strong");
      val.textContent = value;
      row.appendChild(lab);
      row.appendChild(val);
      statsEl.appendChild(row);
    }

    function run() {
      clearError();
      const L = currentLocale;
      const start = parseLocal(startEl.value);
      const end = parseLocal(endEl.value);
      if (!start || !end) {
        showError();
        return;
      }

      const forward = end >= start;
      const a = forward ? start : end;
      const b = forward ? end : start;
      const ms = b - a;

      const totalSeconds = Math.floor(ms / 1000);
      const totalMinutes = Math.floor(ms / 60000);
      const totalHours = Math.floor(ms / 3600000);
      const totalDays = ms / 86400000;

      const cal = calendarComponents(a, b);

      placeholder.hidden = true;
      results.hidden = false;
      directionEl.textContent = forward ? msg(L, "dirForward") : msg(L, "dirBackward");

      statsEl.innerHTML = "";
      addStat(msg(L, "statCalendar"), formatCalendar(cal, L));
      addStat(
        msg(L, "statDaysDec"),
        totalDays.toLocaleString(L, { maximumFractionDigits: 4 }),
      );
      addStat(msg(L, "statHours"), totalHours.toLocaleString(L));
      addStat(msg(L, "statMinutes"), totalMinutes.toLocaleString(L));
      addStat(msg(L, "statSeconds"), totalSeconds.toLocaleString(L));
    }

    localeSelect.addEventListener("change", () => {
      setLocale(localeSelect.value);
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      run();
    });

    swapBtn.addEventListener("click", () => {
      const s = startEl.value;
      startEl.value = endEl.value;
      endEl.value = s;
      if (startEl.value && endEl.value) run();
    });

    const now = new Date();
    const pad = (n) => String(n).padStart(2, "0");
    const toLocalInput = (d) =>
      `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

    const weekAgo = new Date(now);
    weekAgo.setDate(weekAgo.getDate() - 7);
    startEl.value = toLocalInput(weekAgo);
    endEl.value = toLocalInput(now);

    applyStaticUI();
  </script>
</body>
</html>
